# ATL4S service stack.
# Bring up via scripts/dev-up.sh (includes the `sim` profile) or
# scripts/prod-up.sh (no SITL).

x-common: &common
  network_mode: host
  restart: unless-stopped
  volumes:
    # Disables FastDDS shared-memory transport; required for cross-container
    # data delivery (containers share the network namespace but not /dev/shm).
    - ./shared/fastdds_profiles.xml:/fastdds_profiles.xml:ro

# Map form (not list) so the YAML <<: merge into each service's environment
# actually adds keys instead of replacing the whole list.
x-shared-env: &shared-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
  FASTRTPS_DEFAULT_PROFILES_FILE: /fastdds_profiles.xml

services:

  sitl:
    <<: *common
    build:
      context: ./services/sitl
    image: atl4s/sitl:latest
    container_name: atl4s-sitl
    environment:
      <<: *shared-env
      SITL_HOME_LAT: ${SITL_HOME_LAT:-37.6213}
      SITL_HOME_LON: ${SITL_HOME_LON:--122.3790}
      SITL_HOME_ALT: ${SITL_HOME_ALT:-5}
      SITL_HOME_HEADING: ${SITL_HOME_HEADING:-0}
      MAVPROXY_OUT: ${MAVPROXY_OUT:-udp:127.0.0.1:14550}
    profiles: ["sim"]
    depends_on:
      - gazebo

  gazebo:
    <<: *common
    build:
      context: ./services/gazebo
    image: atl4s/gazebo:latest
    container_name: atl4s-gazebo
    environment:
      GZ_WORLD: ${GZ_WORLD:-iris_runway.sdf}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: graphics,compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["sim"]

  gz-bridge:
    <<: *common
    build:
      context: ./services/gz-bridge
    image: atl4s/gz-bridge:latest
    container_name: atl4s-gz-bridge
    environment:
      <<: *shared-env
    profiles: ["sim"]
    depends_on:
      - gazebo

  mavros:
    <<: *common
    build:
      context: ./services/mavros
    image: atl4s/mavros:latest
    container_name: atl4s-mavros
    environment:
      <<: *shared-env
      FCU_URL: ${FCU_URL:-udp://:14550@}
      GCS_URL: ${GCS_URL:-}

  foxglove:
    <<: *common
    build:
      # Repo root so the Dockerfile can pick up shared/atl4s_msgs/ to
      # colcon-build into the image. Without it Studio can't deserialize
      # /perception/lidar/detections (or any atl4s_msgs/* topic).
      context: .
      dockerfile: services/foxglove/Dockerfile
    image: atl4s/foxglove:latest
    container_name: atl4s-foxglove
    environment:
      <<: *shared-env
      FOXGLOVE_PORT: ${FOXGLOVE_PORT:-8765}
    depends_on:
      - mavros

  commander:
    <<: *common
    build:
      context: ./services/commander
    image: atl4s/commander:latest
    container_name: atl4s-commander
    environment:
      <<: *shared-env
      BATTERY_LOW_THRESHOLD: ${BATTERY_LOW_THRESHOLD:-0.20}
    depends_on:
      - mavros

  perception-lidar:
    <<: *common
    build:
      # Repo root so the Dockerfile can pick up shared/atl4s_msgs/
      # alongside services/perception-lidar/.
      context: .
      dockerfile: services/perception-lidar/Dockerfile
    image: atl4s/perception-lidar:latest
    container_name: atl4s-perception-lidar
    environment:
      <<: *shared-env
      LIDAR_CONFIG: /app/config/pipelines/perception-lidar.yaml
    # Same volume-merge trap as elsewhere; re-declare the fastdds mount
    # and add a read-only bind on the pipeline config dir so the service
    # reads the same file the dashboard writes.
    volumes:
      - ./shared/fastdds_profiles.xml:/fastdds_profiles.xml:ro
      - ./services/dashboard/config:/app/config:ro

  rosbag-manager:
    <<: *common
    build:
      context: ./services/rosbag-manager
    image: atl4s/rosbag-manager:latest
    container_name: atl4s-rosbag-manager
    environment:
      <<: *shared-env
      BAG_DIR: /data/bags
      GCS_BUCKET: ${GCS_BUCKET:-atl4s-rosbags}
      ROSBAG_MANAGER_BIND: ${ROSBAG_MANAGER_BIND:-127.0.0.1}
      ROSBAG_MANAGER_PORT: ${ROSBAG_MANAGER_PORT:-8086}
      RECORD_TOPICS: ${RECORD_TOPICS:-/mavros/state /mavros/battery /mavros/global_position/global /mavros/imu/data /camera/image /camera/camera_info}
      STABLE_SECONDS: ${ROSBAG_MANAGER_STABLE_SECONDS:-15}
      POLL_SECONDS: ${ROSBAG_MANAGER_POLL_SECONDS:-10}
    # YAML <<: merge does not deep-merge lists; the x-common volume must be
    # repeated here whenever a service adds its own volume mounts.
    volumes:
      - ./shared/fastdds_profiles.xml:/fastdds_profiles.xml:ro
      - ./data/bags:/data/bags

  dashboard:
    <<: *common
    build:
      # Repo root so the Dockerfile can pick up shared/atl4s_msgs/. The
      # backend's rclpy bridge needs the type installed to resolve
      # atl4s_msgs/* topics in /api/ros/topics and /ws/ros/sample.
      context: .
      dockerfile: services/dashboard/Dockerfile
    image: atl4s/dashboard:latest
    container_name: atl4s-dashboard
    environment:
      <<: *shared-env
      DASHBOARD_BIND: ${DASHBOARD_BIND:-0.0.0.0}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8089}
      BAG_WEB_USER: ${BAG_WEB_USER:-}
      BAG_WEB_PASS: ${BAG_WEB_PASS:-}
      ROSBAG_MANAGER_URL: ${ROSBAG_MANAGER_URL:-http://127.0.0.1:8086}
      ROBOTS_CONFIG: /app/config/robots.yaml
    # YAML <<: merge does not deep-merge lists; re-declare the x-common
    # fastdds mount alongside the dashboard's own binds. The config dir is
    # mounted read-write so the dashboard can persist per-pipeline runtime
    # configs (config/pipelines/{id}.yaml) when the user clicks Save in the
    # Pipelines form. docker.sock is mounted read-only for per-container
    # health (Health page + nav badge); this gives the dashboard container
    # root-equivalent power over the host — acceptable behind HTTP Basic +
    # closed firewall.
    volumes:
      - ./shared/fastdds_profiles.xml:/fastdds_profiles.xml:ro
      - ./services/dashboard/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - rosbag-manager
