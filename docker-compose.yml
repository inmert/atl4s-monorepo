# ATL4S service stack.
# Bring up via scripts/dev-up.sh (dev, includes the `sim` profile) or
# scripts/prod-up.sh (prod, no SITL).

# Shared per-service settings.
x-common: &common
  network_mode: host
  restart: unless-stopped

# Shared environment vars. Merged into each service's environment via `<<:`.
# Must be a map (not a list) for YAML merge to work; service-level lists would
# replace this entirely.
x-shared-env: &shared-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}

services:

  sitl:
    <<: *common
    build:
      context: ./services/sitl
    image: atl4s/sitl:latest
    container_name: atl4s-sitl
    environment:
      <<: *shared-env
      SITL_HOME_LAT: ${SITL_HOME_LAT:-37.6213}
      SITL_HOME_LON: ${SITL_HOME_LON:--122.3790}
      SITL_HOME_ALT: ${SITL_HOME_ALT:-5}
      SITL_HOME_HEADING: ${SITL_HOME_HEADING:-0}
      MAVPROXY_OUT: ${MAVPROXY_OUT:-udp:127.0.0.1:14550}
    profiles: ["sim"]

  mavros:
    <<: *common
    build:
      context: ./services/mavros
    image: atl4s/mavros:latest
    container_name: atl4s-mavros
    environment:
      <<: *shared-env
      FCU_URL: ${FCU_URL:-udp://:14550@}
      GCS_URL: ${GCS_URL:-}
