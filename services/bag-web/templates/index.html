<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ATL4S bags — {{ bucket }}</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         max-width: 1100px; margin: 2em auto; padding: 0 1em; }
  h1 { font-size: 1.15em; margin-bottom: 1em; }
  .muted { color: #888; font-size: 0.85em; }
  .upload { padding: 1em; background: #f4f4f6; border-radius: 6px; margin-bottom: 1.5em; }
  @media (prefers-color-scheme: dark) { .upload { background: #2a2a2e; } }
  .upload input[type=text] { width: 14em; padding: 0.3em; }
  .upload label { margin-right: 0.5em; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 0.4em 0.6em; border-bottom: 1px solid #00000022; text-align: left; font-size: 0.9em; }
  th { font-weight: 600; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .actions { white-space: nowrap; }
  button { font-size: 0.85em; padding: 0.25em 0.7em; cursor: pointer; }
  .danger { color: #c33; }
  #status { margin-top: 0.5em; font-size: 0.85em; min-height: 1em; }
  .ok { color: #2a7; }
  .err { color: #c33; }
  .filerow td { background: #00000008; font-family: ui-monospace, monospace; font-size: 0.8em; }
  .filerow a { color: inherit; }
  details summary { cursor: pointer; }
</style>
</head>
<body>

<h1>ATL4S bags <span class="muted">— gs://{{ bucket }}</span></h1>

<div class="upload">
  <label>Bag name:</label><input type="text" id="upload-name" placeholder="my-bag" autocomplete="off">
  <input type="file" id="upload-files" multiple>
  <button id="upload-btn">Upload</button>
  <div id="status"></div>
</div>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th class="num">Size (MiB)</th>
      <th class="num">Files</th>
      <th>Last updated</th>
      <th class="actions">Actions</th>
    </tr>
  </thead>
  <tbody id="bags"></tbody>
</table>

<script>
const $ = (id) => document.getElementById(id);

function setStatus(msg, cls) {
  const s = $('status');
  s.textContent = msg;
  s.className = cls || '';
}

function mib(bytes) { return (bytes / 1024 / 1024).toFixed(2); }

async function loadBags() {
  const r = await fetch('/api/bags');
  if (!r.ok) { setStatus(`Failed to list bags: ${r.status}`, 'err'); return; }
  const bags = await r.json();
  const tbody = $('bags');
  tbody.innerHTML = '';
  if (bags.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="5" class="muted">No bags yet. Record one or upload above.</td>';
    tbody.appendChild(tr);
    return;
  }
  for (const b of bags) {
    const tr = document.createElement('tr');
    tr.dataset.name = b.name;
    tr.innerHTML = `
      <td>${escapeHtml(b.name)}</td>
      <td class="num">${b.size_mib.toFixed(2)}</td>
      <td class="num">${b.files}</td>
      <td>${b.updated ? new Date(b.updated).toLocaleString() : ''}</td>
      <td class="actions">
        <button data-act="files">Files</button>
        <button data-act="delete" class="danger">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

async function loadFiles(name, anchor) {
  const r = await fetch(`/api/bags/${encodeURIComponent(name)}/files`);
  if (!r.ok) { setStatus(`Failed to list files in ${name}: ${r.status}`, 'err'); return; }
  const files = await r.json();
  const row = document.createElement('tr');
  row.className = 'filerow';
  row.dataset.parent = name;
  const cell = document.createElement('td');
  cell.colSpan = 5;
  cell.innerHTML = files.map(f =>
    `<a href="/api/bags/${encodeURIComponent(name)}/files/${encodeURIComponent(f.name)}">${escapeHtml(f.name)}</a> <span class="muted">(${mib(f.size_bytes)} MiB)</span>`
  ).join('<br>');
  row.appendChild(cell);
  anchor.parentElement.insertBefore(row, anchor.nextSibling);
}

async function deleteBag(name) {
  if (!confirm(`Delete bag "${name}" and all its files from GCS? This cannot be undone.`)) return;
  setStatus(`Deleting ${name}…`);
  const r = await fetch(`/api/bags/${encodeURIComponent(name)}`, { method: 'DELETE' });
  if (!r.ok) { setStatus(`Delete failed: ${r.status}`, 'err'); return; }
  const j = await r.json();
  setStatus(`Deleted ${j.deleted} file(s) from ${name}.`, 'ok');
  loadBags();
}

async function uploadFiles() {
  const name = $('upload-name').value.trim();
  const files = $('upload-files').files;
  if (!name) { setStatus('Pick a bag name first.', 'err'); return; }
  if (files.length === 0) { setStatus('Pick at least one file.', 'err'); return; }
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  setStatus(`Uploading ${files.length} file(s) to ${name}…`);
  $('upload-btn').disabled = true;
  try {
    const r = await fetch(`/api/bags/${encodeURIComponent(name)}/upload`, { method: 'POST', body: fd });
    if (!r.ok) { setStatus(`Upload failed: ${r.status}`, 'err'); return; }
    const j = await r.json();
    setStatus(`Uploaded ${j.uploaded.length} file(s) to ${j.bag}.`, 'ok');
    $('upload-files').value = '';
    loadBags();
  } finally {
    $('upload-btn').disabled = false;
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

$('bags').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const row = btn.closest('tr');
  const name = row.dataset.name;
  if (btn.dataset.act === 'delete') deleteBag(name);
  if (btn.dataset.act === 'files') {
    const existing = row.nextElementSibling;
    if (existing && existing.classList.contains('filerow') && existing.dataset.parent === name) {
      existing.remove();
    } else {
      loadFiles(name, row);
    }
  }
});

$('upload-btn').addEventListener('click', uploadFiles);

loadBags();
setInterval(loadBags, 15000);
</script>

</body>
</html>
