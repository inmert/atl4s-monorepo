# Pipeline registry — declarative description of every perception / fusion
# service the dashboard knows about. Read once at startup; restart the
# dashboard container to pick up changes.
#
# Schema per entry:
#   id              kebab-case unique identifier (URL slug, runtime config file name)
#   name            display name
#   description     one-line summary for the card
#   kind            "perception" | "fusion" (free-form bucket)
#   icon            lucide hint: "perception" | "fusion" | "target" | "scan" | "brain"
#   container       docker container name to start / stop (the service itself)
#   input_topics    [str]   ROS topics the service subscribes to
#   output_topics   [str]   ROS topics the service publishes
#   config_schema   [Field] declarative config form — see field types below
#
# Field types:
#   string                            text input
#   number                            number input (optional `min`, `max`, `step`)
#   slider                            slider (requires `min`, `max`, `step`)
#   boolean                           toggle
#   select  (requires `options:`)     dropdown
#   list_string                       comma- / whitespace-split list editor
#
# A pipeline's runtime config lives at services/dashboard/config/pipelines/
# {id}.yaml. The dashboard writes that file when the user clicks Save in the
# config form; the perception service is expected to mount the same file and
# read it at startup (`Configure ▸` will be a no-op until the service exists).

- id: perception-lidar
  name: Lidar Perception
  description: Detect aircraft and tank-class targets from 3D point clouds or 2D laser scans.
  kind: perception
  icon: target
  container: atl4s-perception-lidar
  input_topics:
    - /lidar/points
  output_topics:
    - /perception/lidar/detections
    - /perception/lidar/markers
  config_schema:
    - name: model_variant
      label: Model variant
      type: select
      options: [pointpillars, centerpoint, voxelnet]
      default: pointpillars
    - name: confidence_threshold
      label: Confidence threshold
      type: slider
      min: 0
      max: 1
      step: 0.01
      default: 0.5
    - name: target_classes
      label: Target classes
      type: list_string
      default: [aircraft, tank]
    - name: input_type
      label: Input modality
      type: select
      options: [pointcloud2, laserscan]
      default: pointcloud2
    - name: input_topic
      label: Input topic
      type: string
      default: /lidar/points
    - name: output_topic
      label: Output topic
      type: string
      default: /perception/lidar/detections
    - name: marker_topic
      label: Marker topic (Foxglove 3D viz)
      type: string
      default: /perception/lidar/markers
    - name: enable_tracking
      label: Enable tracking
      type: boolean
      default: false
