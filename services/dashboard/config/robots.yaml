# Robot registry — read once at dashboard startup. Adding a robot here is
# enough for it to appear in the UI and for the topic + camera bridges to
# subscribe to its streams. Restart the dashboard container to pick up
# changes.
#
# Schema per entry:
#   id        kebab-case unique identifier (used in URLs and WebSocket paths)
#   name      display name
#   kind      free-form bucket: "simulator" | "drone" | "rover" | …
#   icon      lucide icon hint: "simulator" | "drone" | "rover" | "bot"
#             (frontend maps to the corresponding lucide-react icon)
#   telemetry topic map. All keys optional; only what's present is shown.
#     state   mavros_msgs/State        → live connection / mode / armed
#     battery sensor_msgs/BatteryState → battery panel
#     imu     sensor_msgs/Imu          → IMU panel
#     gps     sensor_msgs/NavSatFix    → map + GPS panel
#     camera  sensor_msgs/Image        → JPEG-encoded camera viewport
#
# A robot is considered Online when its `telemetry.state` topic is fresh
# and reports `connected: true`. Robots without a `state` topic fall back
# to "any telemetry topic seen recently".

- id: gazebo-drone
  name: Gazebo Drone
  kind: simulator
  icon: simulator
  telemetry:
    state: /mavros/state
    battery: /mavros/battery
    imu: /mavros/imu/data
    gps: /mavros/global_position/global
    camera: /camera/image

- id: orin-drone
  name: Orin Drone
  kind: drone
  icon: drone
  telemetry:
    state: /orin/mavros/state
    battery: /orin/mavros/battery
    imu: /orin/mavros/imu/data
    gps: /orin/mavros/global_position/global
    camera: /orin/camera/image
