/foxglove_bridge:
  ros__parameters:
    # Topic regexes for which the bridge subscribes Best Effort instead of its
    # default Reliable. Prevents backpressure on high-rate BE publishers and
    # silent drops of BE-published topics under a Reliable subscription.
    # /uas1/.* is MAVROS's raw MAVLink stream (BE publisher); without this
    # entry Foxglove silently drops every Mavlink message.
    best_effort_qos_topic_whitelist:
      - "/mavros/.*"
      - "/uas1/.*"
      - "/lidar/.*"
      - "/perception/.*"
      - "/fusion/.*"
